<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" width="760" height="220" role="img" aria-label="Nihal Puse — signature">
  <defs>
    <linearGradient id="sigBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="1" stop-color="#11161f"/>
    </linearGradient>
    <linearGradient id="sigAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="sigGlow" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- card -->
  <rect x="0" y="0" width="760" height="220" rx="18" fill="url(#sigBg)"/>
  <rect x="0" y="0" width="760" height="220" rx="18" fill="url(#sigGlow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- editorial corner ticks -->
  <g stroke="url(#sigAccent)" stroke-width="2.2" stroke-linecap="round" opacity="0.6" fill="none">
    <path d="M28 26 H66 M28 26 V64"/>
    <path d="M732 194 H694 M732 194 V156"/>
  </g>

  <!-- ink fill of the name (fades in after the stroke writes it) -->
  <text x="380" y="118" text-anchor="middle"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="92" font-weight="700" font-style="italic" letter-spacing="1"
        fill="url(#sigAccent)" opacity="0">Nihal Puse
    <animate attributeName="opacity"
      values="0;0;0.95;0.95;0" keyTimes="0;0.30;0.44;0.82;0.92"
      dur="7s" repeatCount="indefinite"/>
  </text>

  <!-- self-drawing stroke of the name -->
  <text x="380" y="118" text-anchor="middle"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="92" font-weight="700" font-style="italic" letter-spacing="1"
        fill="none" stroke="url(#sigAccent)" stroke-width="1.4"
        stroke-dasharray="4200" stroke-dashoffset="4200">Nihal Puse
    <animate attributeName="stroke-dashoffset"
      values="4200;0;0;4200" keyTimes="0;0.32;0.85;1"
      dur="7s" repeatCount="indefinite"/>
  </text>

  <!-- flourish underline that sweeps in after the name -->
  <path d="M150 158 C 300 192, 470 188, 632 154"
        fill="none" stroke="url(#sigAccent)" stroke-width="2.6" stroke-linecap="round"
        stroke-dasharray="640" stroke-dashoffset="640">
    <animate attributeName="stroke-dashoffset"
      values="640;640;0;0;640" keyTimes="0;0.34;0.52;0.85;1"
      dur="7s" repeatCount="indefinite"/>
  </path>

  <!-- pen-tip dot riding the end of the flourish -->
  <circle r="3.2" fill="#2dd4bf" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.34;0.4;0.5;0.55" dur="7s" repeatCount="indefinite"/>
    <animateMotion path="M150 158 C 300 192, 470 188, 632 154" keyPoints="0;0;1;1" keyTimes="0;0.34;0.52;1" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- role caption -->
  <text x="380" y="192" text-anchor="middle"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="14" font-weight="600" letter-spacing="5" fill="#9aa4b2" opacity="0.85">FULL-STACK SOFTWARE ENGINEER</text>
</svg>
