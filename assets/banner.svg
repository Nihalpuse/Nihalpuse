<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Nihal Puse — Frontend Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="1" stop-color="#11161f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="28%" r="62%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="1280" height="320" rx="18" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="320" rx="18" fill="url(#glow)"/>

  <!-- editorial corner ticks -->
  <g stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.75" fill="none">
    <path d="M40 36 H92 M40 36 V88"/>
    <path d="M1240 36 H1188 M1240 36 V88"/>
    <path d="M40 284 H92 M40 284 V232"/>
    <path d="M1240 284 H1188 M1240 284 V232"/>
  </g>

  <!-- faint dev-glyph echoes -->
  <text x="196" y="200" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="120" font-weight="700" fill="#2dd4bf" opacity="0.05" text-anchor="middle">&lt;/&gt;</text>
  <text x="1084" y="200" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="120" font-weight="700" fill="#6366f1" opacity="0.06" text-anchor="middle">{ }</text>

  <!-- name -->
  <text x="640" y="150" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="74" font-weight="700" fill="#e6edf3" letter-spacing="1">Nihal Puse</text>

  <!-- divider -->
  <rect x="606" y="176" width="68" height="4" rx="2" fill="url(#accent)"/>

  <!-- role -->
  <text x="640" y="222" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="7" fill="#9aa4b2">FRONTEND DEVELOPER</text>

  <!-- finishing dots -->
  <g fill="url(#accent)" opacity="0.6">
    <circle cx="624" cy="252" r="2.6"/>
    <circle cx="640" cy="252" r="2.6"/>
    <circle cx="656" cy="252" r="2.6"/>
  </g>
</svg>
