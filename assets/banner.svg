<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Nihal Puse — Full-Stack Software Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="1" stop-color="#11161f"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="30%" r="62%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <!-- soft highlight band that glides across the name -->
    <linearGradient id="nameSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dbe4ee"/>
      <stop offset="0.4" stop-color="#dbe4ee"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#dbe4ee"/>
      <stop offset="1" stop-color="#dbe4ee"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-1 0; 1 0; -1 0" dur="8s" repeatCount="indefinite"/>
    </linearGradient>

    <clipPath id="frame">
      <rect x="0" y="0" width="1280" height="320" rx="18"/>
    </clipPath>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="1280" height="320" rx="18" fill="url(#bg)"/>

  <g clip-path="url(#frame)">

    <!-- breathing glow -->
    <rect x="0" y="0" width="1280" height="320" fill="url(#glow)">
      <animate attributeName="opacity" values="0.65;1;0.65" dur="8s" repeatCount="indefinite"/>
    </rect>

    <!-- thin accent hairline that draws across the top -->
    <path d="M0 2 H1280" stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.5"
          stroke-dasharray="1280" stroke-dashoffset="1280">
      <animate attributeName="stroke-dashoffset" values="1280;0;0;1280" keyTimes="0;0.4;0.8;1" dur="10s" repeatCount="indefinite"/>
    </path>

    <!-- editorial corner ticks (gentle pulse) -->
    <g stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7">
      <animate attributeName="opacity" values="0.45;0.8;0.45" dur="6s" repeatCount="indefinite"/>
      <path d="M40 36 H92 M40 36 V88"/>
      <path d="M1240 36 H1188 M1240 36 V88"/>
      <path d="M40 284 H92 M40 284 V232"/>
      <path d="M1240 284 H1188 M1240 284 V232"/>
    </g>

    <!-- faint dev-glyph echoes (slow float) -->
    <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-weight="700" text-anchor="middle">
      <text x="196" y="200" font-size="120" fill="#2dd4bf" opacity="0.05">&lt;/&gt;
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -7; 0 0" dur="9s" repeatCount="indefinite"/>
      </text>
      <text x="1084" y="200" font-size="120" fill="#6366f1" opacity="0.06">{ }
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 7; 0 0" dur="10s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- name with sweeping sheen -->
    <text x="640" y="146" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="76" font-weight="700" fill="url(#nameSheen)" letter-spacing="1">Nihal Puse</text>

    <!-- animated divider -->
    <rect x="606" y="174" width="68" height="4" rx="2" fill="url(#accent)">
      <animate attributeName="width" values="68;108;68" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="x" values="606;586;606" dur="5s" repeatCount="indefinite"/>
    </rect>

    <!-- role -->
    <text x="640" y="218" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="19" font-weight="600" letter-spacing="6" fill="#9aa4b2">FULL-STACK SOFTWARE ENGINEER</text>

    <!-- tech line -->
    <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="500" letter-spacing="2" text-anchor="middle">
      <text x="640" y="252" fill="#6b7585">Python
        <tspan fill="#2dd4bf" dx="2" dy="0">·</tspan><tspan fill="#6b7585" dx="2">TypeScript</tspan><tspan fill="#2dd4bf" dx="2">·</tspan><tspan fill="#6b7585" dx="2">Next.js</tspan>
      </text>
    </g>

  </g>
</svg>
